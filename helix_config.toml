theme = "catppuccin_macchiato"

[editor]
auto-pairs = false
bufferline = "always"
color-modes = true
mouse = false
rulers = [120]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.soft-wrap]
enable = true

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"] # deselect all and keep primary cursor same as ";,"
C-b = ':sh git blame "-L $(( %{cursor_line} - 5 < 1 ? 1 : %{cursor_line} - 5 )),$(( %{cursor_line} + 5 ))" %{buffer_name}'
C-h = "goto_next_buffer"
C-l = "goto_previous_buffer"

[keys.normal.space]
B = ":echo %sh{gh browse %{buffer_name}:%{cursor_line} || gh browse --no-browser %{buffer_name}:%{cursor_line}}" # print URL in case we are in en env without a browser
w = ":buffer-close"

[keys.normal.C-w]
tab = "rotate_view"
